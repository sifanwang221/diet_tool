<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150cm 減脂戰鬥機 v13.0</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #fdfbf6; --card-bg: #ffffff; --text-main: #2d3436; --water: #0984e3; --fast: #d63031; --sport: #e17055; --cheat: #fdcb6e; --green: #27ae60; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); padding: 10px; display: flex; justify-content: center; margin: 0; }
        .container { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); padding: 20px; box-sizing: border-box; min-height: 95vh; position: relative; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 10px 5px; border: none; border-radius: 10px; background: transparent; font-weight: bold; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: white; border: 1px solid #f1f2f6; border-radius: 18px; padding: 15px; margin-bottom: 12px; }
        .status-card { padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 10px; color: white; transition: 0.3s; }
        
        /* 進度條樣式 */
        .progress-container { background: #eee; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        #progress-bar { background: var(--green); width: 0%; height: 100%; transition: 0.5s; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 5px; }
        th, td { border: 1px solid #eee; padding: 8px 4px; text-align: left; }
        th { background: #f9f9f9; }

        input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 5px; box-sizing: border-box; }
        .fist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .water-drop { font-size: 1.6rem; cursor: pointer; filter: grayscale(1); opacity: 0.3; transition: 0.2s; display: inline-block; margin: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="showPage('p1', 't1')">💡 靈感庫</button>
        <button id="t2" class="tab-btn" onclick="showPage('p2', 't2')">📊 紀錄儀</button>
        <button id="t3" class="tab-btn" onclick="showPage('p3', 't3')">🏃 運動/水</button>
    </div>

    <div id="p1" class="page active">
        <div class="card">
            <h3 style="margin:0 0 10px 0">🍱 情境選食指南</h3>
            <table>
                <tr><th>場景</th><th>推薦(Safe)</th><th>避雷(NG)</th></tr>
                <tr><td>麵攤</td><td>下水湯麵/肝連</td><td>乾麵/肉燥飯</td></tr>
                <tr><td>火鍋</td><td>昆布鍋/雞/魚</td><td>沙拉醬/加工料</td></tr>
                <tr><td>日式</td><td>烤魚/刺身/蒸蛋</td><td>炸豬排/咖哩</td></tr>
                <tr><td>小食</td><td>茶葉蛋/無糖豆漿</td><td>蘿蔔糕/甜不辣</td></tr>
            </table>
        </div>
        <div class="card">
            <h3 style="margin:0 0 10px 0">🍎 水果分級</h3>
            <div style="font-size:0.85rem">
                🟢 <b>優選</b>：芭樂、小番茄、藍莓、蘋果<br>
                🔴 <b>限量</b>：芒果、西瓜、葡萄、荔枝
            </div>
        </div>
    </div>

    <div id="p2" class="page">
        <div id="totalBox" class="status-card" style="background:var(--primary)">
            <div id="totalDisplay" style="font-size:2.5rem; font-weight:800;">0</div>
            <div id="targetText">目標: 1100-1200 kcal</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
        </div>
        <div id="talkBox" style="background:#f1f2f6; padding:10px; border-radius:10px; margin-bottom:12px; font-size:0.85rem; text-align:center">(ಠ_ರೃ) 數據自動保存中</div>
        
        <div class="card">
            <h3 style="margin:0 0 5px 0">🧮 試算表輸入</h3>
            <input type="text" id="calcInput" placeholder="輸入數字加減, 如: 200+150" oninput="autoCalc()">
            <h3 style="margin:10px 0 5px 0">🖐️ 自助餐拳頭</h3>
            <div class="fist-grid">
                <input type="number" id="f_meat" placeholder="🥩 肉拳" oninput="autoCalc()">
                <input type="number" id="f_veg" placeholder="🥬 菜拳" oninput="autoCalc()">
                <input type="number" id="f_carbs" placeholder="🍚 澱粉拳" oninput="autoCalc()">
                <input type="number" id="f_extra" placeholder="➕ 手動" oninput="autoCalc()">
            </div>
        </div>
        <div id="timerBox" class="status-card" style="background:var(--fast)">
            <div id="timer" style="font-size:1.5rem; font-weight:800;">--:--:--</div>
            <div id="fast-status" style="font-size:0.75rem">斷食狀態...</div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="card" style="background:#e1f5fe; border:none; text-align:center">
            <h3 style="color:var(--water); margin-top:0">💧 每日飲水 (1900ml)</h3>
            <div id="waterGrid"></div>
            <div id="waterText" style="font-weight:bold; color:var(--water); margin-top:10px">已喝：0 ml</div>
        </div>
        <button style="background:var(--sport); color:white; border:none; padding:12px; border-radius:12px; width:100%; font-weight:bold" onclick="generateWorkout()">🎲 生成 Rumbo 課表</button>
        <div id="workout-list" style="margin-top:10px"></div>
    </div>
</div>

<script>
    function showPage(p, t) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById(t).classList.add('active');
    }

    function autoCalc() {
        const formula = document.getElementById('calcInput').value;
        let inputTotal = 0;
        try { if(formula.trim() !== "") inputTotal = Function('"use strict"; return (' + formula.replace(/[^-()\d/*+.]/g, '') + ')')(); } catch(e) {}
        
        const m = (parseFloat(document.getElementById('f_meat').value) || 0) * 200;
        const v = (parseFloat(document.getElementById('f_veg').value) || 0) * 35;
        const c = (parseFloat(document.getElementById('f_carbs').value) || 0) * 280;
        const e = parseInt(document.getElementById('f_extra').value) || 0;
        
        const final = Math.round(inputTotal + m + v + c + e);
        document.getElementById('totalDisplay').innerText = final;
        
        // 進度條與顏色邏輯
        const bar = document.getElementById('progress-bar');
        const pct = Math.min((final / 1200) * 100, 100);
        bar.style.width = pct + '%';
        if(final > 1250) bar.style.background = 'var(--fast)';
        else if(final >= 1000) bar.style.background = 'var(--green)';
        else bar.style.background = '#fdcb6e';

        localStorage.setItem('dietData', JSON.stringify({f: formula, m: m/200, v: v/35, c: c/280, e: e}));
    }

    // 初始化與飲水保存
    let wCount = parseInt(localStorage.getItem('waterCount')) || 0;
    const grid = document.getElementById('waterGrid');
    for(let i=0; i<8; i++) {
        const d = document.createElement('span'); d.className = 'water-drop'; d.innerText = '💧';
        if(i < wCount) { d.style.filter = 'grayscale(0)'; d.style.opacity = '1'; }
        d.onclick = function() {
            this.style.filter = this.style.filter === 'grayscale(0)' ? 'grayscale(1)' : 'grayscale(0)';
            this.style.opacity = this.style.opacity === '1' ? '0.3' : '1';
            wCount = Array.from(grid.children).filter(c => c.style.filter === 'grayscale(0)').length;
            document.getElementById('waterText').innerText = `已喝：${wCount * 250} ml`;
            localStorage.setItem('waterCount', wCount);
        };
        grid.appendChild(d);
    }
    document.getElementById('waterText').innerText = `已喝：${wCount * 250} ml`;

    // 恢復紀錄
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('dietData'));
        if(saved) {
            document.getElementById('calcInput').value = saved.f || "";
            document.getElementById('f_meat').value = saved.m || "";
            document.getElementById('f_veg').value = saved.v || "";
            document.getElementById('f_carbs').value = saved.c || "";
            document.getElementById('f_extra').value = saved.e || "";
            autoCalc();
        }
    };

    function generateWorkout() {
        const moves = ["Jumping Jack", "Crunch", "Plank", "Squat", "Push Up", "Mountain Climber"];
        const shuffled = moves.sort(() => 0.5 - Math.random());
        let h = "";
        shuffled.forEach((m, i) => h += `<div style="padding:10px; background:#f9f9f9; margin-bottom:5px; border-radius:10px"><b>${i+1}.</b> ${m} - 30s</div>`);
        document.getElementById('workout-list').innerHTML = h;
    }

    function updateTimer() {
        const now = new Date();
        const start = new Date(); start.setHours(13,0,0,0);
        const stop = new Date(); stop.setHours(19,0,0,0);
        const tEl = document.getElementById('timer');
        const sEl = document.getElementById('fast-status');
        if (now >= start && now < stop) {
            tEl.innerText = formatMs(stop - now); sEl.innerText = "進食窗口開放中 🟢";
        } else {
            let target = start; if (now >= stop) target.setDate(target.getDate()+1);
            tEl.innerText = formatMs(target - now); sEl.innerText = "斷食燃脂中 🔴";
        }
    }
    function formatMs(ms) {
        const h = Math.floor(ms/3600000).toString().padStart(2,'0');
        const m = Math.floor((ms%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((ms%60000)/1000).toString().padStart(2,'0');
        return `${h}:${m}:${s}`;
    }
    setInterval(updateTimer, 1000); updateTimer();
</script>
</body>
</html>
