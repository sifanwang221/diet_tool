<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150cm 減脂戰鬥機 v10.1</title>
    <style>
        :root { 
            --primary: #6c5ce7; 
            --primary-light: #a29bfe;
            --bg: #fdfbf6; 
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --water: #0984e3; 
            --fast: #d63031; 
            --sport: #e17055; 
            --shadow: 0 10px 20px rgba(108, 92, 231, 0.05); 
        }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 30px; box-shadow: var(--shadow); padding: 25px; box-sizing: border-box; min-height: 90vh; }
        
        /* Tab Navigation */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; font-weight: bold; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Page Display Control - 關鍵修正 */
        .page { display: none; visibility: hidden; }
        .page.active { display: block; visibility: visible; }

        /* Status Cards */
        .status-card { padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; color: white; }
        .timer-box { background: var(--fast); }
        .stats-box { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); }
        
        .talk-bubble { background: #f1f2f6; color: var(--text-main); padding: 15px; border-radius: 15px; font-size: 0.9rem; margin-bottom: 15px; border-left: 5px solid var(--primary-light); line-height: 1.4; }
        
        .card { background: var(--card-bg); border: 1px solid #f1f2f6; border-radius: 18px; padding: 18px; margin-bottom: 15px; }
        h3 { margin: 0 0 12px 0; font-size: 1rem; color: var(--text-main); font-weight: 700; }
        
        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; background-color: #fafafa; }
        .fist-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px; }
        
        .workout-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #eee; }
        .workout-time { background: #ffeaa7; color: #d63031; padding: 4px 8px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; }

        button { padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-size: 1rem; }
        .btn-main { background: var(--primary); color: white; margin-top: 10px; }
        .btn-gen { background: var(--sport); color: white; margin-bottom: 15px; }
        .btn-calc { background-color: #55efc4; color: #2d3436; margin-bottom: 10px; }
        
        .ng-hint { font-size: 0.75rem; color: var(--text-sub); text-align: center; margin-top: 25px; line-height: 1.5; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="btn-diet" class="tab-btn active" onclick="showPage('diet')">🍱 飲食紀錄</button>
        <button id="btn-sport" class="tab-btn" onclick="showPage('sport')">🏃 運動計畫</button>
    </div>

    <div id="diet" class="page active">
        <div id="talkBox" class="talk-bubble">讀取對話中... (ಠ_ರೃ)</div>
        
        <div class="status-card timer-box" id="timerBox">
            <div id="timer" style="font-size: 2rem; font-weight: 800;">--:--:--</div>
            <div id="fast-status" style="font-size: 0.85rem; margin-top: 5px;">186 狀態讀取中</div>
        </div>

        <div class="status-card stats-box">
            <div style="font-size: 2.8rem; font-weight: 800;" id="totalDisplay">0</div>
            <div style="font-size: 0.85rem; opacity: 0.9;">今日攝取 (目標 1100-1200 kcal)</div>
        </div>

        <div class="card">
            <h3>🌅 第一餐 (12:00)</h3>
            <select id="b_sel" onchange="sync()">
                <option value="0">--- 點我選擇 ---</option>
                <option value="180">能量果凍 (180k)</option>
                <option value="155">茶葉蛋2顆+黑咖啡 (155k)</option>
                <option value="210">鮪魚飯糰 (210k)</option>
                <option value="280">起司蛋吐司-去邊 (280k)</option>
            </select>
        </div>

        <div class="card">
            <h3>🍱 主餐建議</h3>
            <select id="l_sel" onchange="sync()">
                <option value="0">--- 午餐選這 ---</option>
                <option value="350">去骨雞腿排沙拉 (350k)</option>
                <option value="420">超商蕎麥涼麵 (420k)</option>
                <option value="400">滷味(青菜/蛋白/科學麵) (400k)</option>
            </select>
            <select id="d_sel" onchange="sync()">
                <option value="0">--- 晚餐選這 ---</option>
                <option value="150">舒肥雞胸肉 (150k)</option>
                <option value="380">火鍋(瘦肉/大量菜) (380k)</option>
                <option value="300">關東煮(蘿蔔/豆腐/肉) (300k)</option>
            </select>
        </div>

        <div class="card">
            <h3>🖐️ 自助餐/手動份量</h3>
            <div class="fist-row">
                <input type="number" id="f_meat" placeholder="🥩 肉拳頭" oninput="sync()">
                <input type="number" id="f_veg" placeholder="🥬 菜拳頭" oninput="sync()">
            </div>
            <div class="fist-row">
                <input type="number" id="f_carbs" placeholder="🍚 澱粉拳" oninput="sync()">
                <input type="number" id="extra_kcal" placeholder="➕ 其他" oninput="sync()">
            </div>
            <button class="btn-calc" onclick="sync()">🔄 更新計算與吐槽</button>
        </div>
        <button class="btn-main" onclick="saveToCalendar()">💾 儲存今日紀錄到日曆</button>
    </div>

    <div id="sport" class="page">
        <div id="sportTalk" class="talk-bubble">不想動嗎？我也是。 (ಠ_ರೃ)</div>

        <div class="card" style="background: linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 100%); border: none;">
            <h3 style="color: var(--water);">💧 飲水進度 (1900ml)</h3>
            <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin: 15px 0;" id="waterGrid"></div>
            <div id="waterText" style="text-align:center; font-size:0.9rem; font-weight:bold; color: var(--water);">已喝：0 ml</div>
        </div>

        <button class="btn-gen" onclick="generateWorkout()">🎲 生成今日 Rumbo 隨機課表</button>
        
        <div class="card" id="workout-list">
            <div style="text-align:center; color:#ccc; padding:30px 20px;">點擊上方按鈕組合課表</div>
        </div>
        
        <div class="card" style="background-color: #fafafa; border-style: dashed;">
            <h3>💡 訓練提示</h3>
            <p style="font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; margin: 0;">
                • Rumbo app 內動作重複做 3 輪。<br>
                • 每個動作 30-45s，休息 15s。<br>
                • 睡前 22:00 太累可抽溫和動作。
            </p>
        </div>
    </div>

    <div class="ng-hint">
        <b>🚫 避雷區：</b>胡蘿蔔、洋蔥、小黃瓜、番茄、苦瓜、有骨肉<br>
        22歲 | 150cm | 減脂智算機 v10.1
    </div>
</div>

<script>
    // 分頁切換功能 (修復版)
    function showPage(pageId) {
        // 先隱藏所有頁面
        document.getElementById('diet').classList.remove('active');
        document.getElementById('sport').classList.remove('active');
        
        // 移除所有按鈕 active 狀態
        document.getElementById('btn-diet').classList.remove('active');
        document.getElementById('btn-sport').classList.remove('active');
        
        // 顯示指定的頁面與按鈕
        document.getElementById(pageId).classList.add('active');
        document.getElementById('btn-' + pageId).classList.add('active');
        
        // 如果是運動頁面，隨機換金句
        if(pageId === 'sport') {
            const sQuotes = ["「汗水是脂肪的淚水，雖然很鹹。」", "「動一下吧，難道你想讓隔壁貓看笑話？」", "「這 30 分鐘是我人生最漫長的時刻。」", "「既然生成了，就勉強動一下吧。」"];
            document.getElementById('sportTalk').innerText = sQuotes[Math.floor(Math.random()*sQuotes.length)] + " (ಠ_ರೃ)";
        }
    }

    // 數據同步與吐槽
    const quotes = {
        high: ["【AI閨蜜】胃是百寶袋？再吃要訂大碼衣了喔。", "【嚕嚕米】這肚子...沙發都要塌了喵。", "【厭世族】這份量，是在吃最後一餐嗎？"],
        low: ["【AI閨蜜】想修仙？快去補顆蛋，別過度斷食。", "【嚕嚕米】沒力氣鏟屎了嗎？快去吃飯喵。", "【厭世族】沒吃量怎麼應付老闆？"],
        perfect: ["【AI閨蜜】算你狠，這自律程度我服了。", "【嚕嚕米】哼，勉勉強強算合格吧，人類。", "【厭世族】達成目標了，可以下班了嗎？"]
    };

    function sync() {
        const b = parseInt(document.getElementById('b_sel').value) || 0;
        const l = parseInt(document.getElementById('l_sel').value) || 0;
        const d = parseInt(document.getElementById('d_sel').value) || 0;
        const meat = (parseFloat(document.getElementById('f_meat').value) || 0) * 200;
        const veg = (parseFloat(document.getElementById('f_veg').value) || 0) * 35;
        const carbs = (parseFloat(document.getElementById('f_carbs').value) || 0) * 280;
        const extra = parseInt(document.getElementById('extra_kcal').value) || 0;
        
        const total = Math.round(b + l + d + meat + veg + carbs + extra);
        document.getElementById('totalDisplay').innerText = total;
        
        let q = "";
        const box = document.getElementById('talkBox');
        if(total > 1250) q = quotes.high[Math.floor(Math.random()*quotes.high.length)];
        else if(total >= 1000) q = quotes.perfect[Math.floor(Math.random()*quotes.perfect.length)];
        else q = quotes.low[Math.floor(Math.random()*quotes.low.length)];
        box.innerText = q + " (ಠ_ರೃ)";
    }

    // 運動生成
    function generateWorkout() {
        const moves = ["Jumping Jack", "Crunch", "Cycling Crunch", "Knee Raise", "Mountain Climber", "Plank", "Push Up", "Squat", "Slow Jogging", "Superman"];
        const shuffled = moves.sort(() => 0.5 - Math.random()).slice(0, 6);
        let html = "<h3>🎲 今日隨機課表 (做 3 輪)</h3>";
        shuffled.forEach((m, i) => {
            html += `<div class="workout-item"><span style="font-weight:600;">${i+1}. ${m}</span><span class="workout-time">30s</span></div>`;
        });
        document.getElementById('workout-list').innerHTML = html;
        document.getElementById('sportTalk').innerText = "既然生成了，就動一下吧喵。 (ಠ_ರೃ)";
    }

    // 飲水邏輯
    let wCount = 0;
    const waterGrid = document.getElementById('waterGrid');
    for(let i=0; i<8; i++) {
        const drop = document.createElement('span');
        drop.innerText = '💧'; 
        drop.style.cssText = "font-size:1.8rem; cursor:pointer; transition: 0.2s; filter:grayscale(1); opacity: 0.5;";
        drop.onclick = function() {
            if(this.style.filter === 'grayscale(1)') {
                this.style.filter = 'grayscale(0)'; this.style.opacity = '1'; this.style.transform = 'scale(1.1)';
            } else {
                this.style.filter = 'grayscale(1)'; this.style.opacity = '0.5'; this.style.transform = 'scale(1)';
            }
            wCount = Array.from(waterGrid.children).filter(c => c.style.filter === 'grayscale(0)').length;
            document.getElementById('waterText').innerText = `已喝：${wCount * 250} ml / 1900ml`;
        };
        waterGrid.appendChild(drop);
    }

    // 計時器
    function updateTimer() {
        const now = new Date();
        const startE = new Date(); startE.setHours(13,0,0,0);
        const stopE = new Date(); stopE.setHours(19,0,0,0);
        const tEl = document.getElementById('timer');
        const sEl = document.getElementById('fast-status');
        const box = document.getElementById('timerBox');
        if (now >= startE && now < stopE) {
            tEl.innerText = formatMs(stopE - now);
            sEl.innerText = "進食窗口開放中 🟢"; box.style.background = "#00b894";
        } else {
            let target = startE; if (now >= stopE) target.setDate(target.getDate()+1);
            tEl.innerText = formatMs(target - now);
            sEl.innerText = "斷食燃脂中 🔴"; box.style.background = "#d63031";
        }
    }
    function formatMs(ms) {
        const h = Math.floor(ms / 3600000).toString().padStart(2, '0');
        const m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }
    setInterval(updateTimer, 1000); updateTimer();

    function saveToCalendar() {
        const kcal = document.getElementById('totalDisplay').innerText;
        window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('減脂日記：'+kcal+'k')}&add=`, '_blank');
    }
    sync();
</script>
</body>
</html>
