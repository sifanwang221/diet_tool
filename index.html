<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150cm 減脂戰鬥機 v5.0</title>
    <style>
        :root { --primary: #6c5ce7; --accent: #a29bfe; --bg: #f0f2f5; --water: #0984e3; --fast: #d63031; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont; background: var(--bg); padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; font-size: 1rem; color: #444; border-left: 4px solid var(--primary); padding-left: 8px; }
        
        /* 斷食計時器 */
        .timer-box { background: var(--fast); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .timer-val { font-size: 1.8rem; font-weight: bold; font-variant-numeric: tabular-nums; }

        /* 飲水追蹤 */
        .water-box { background: #e1f5fe; border: 1px solid var(--water); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        .water-grid { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .water-drop { font-size: 1.5rem; cursor: pointer; filter: grayscale(1); transition: 0.3s; }
        .water-drop.active { filter: grayscale(0); transform: scale(1.2); }

        /* 熱量統計 */
        .stats-box { background: var(--primary); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .kcal-display { font-size: 2.5rem; font-weight: 800; }

        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        .fist-calc { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
        .fist-calc input { width: 70px; margin-bottom: 0; text-align: center; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        button { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .btn-main { background: #1976d2; color: white; width: 100%; }
        .btn-dice { background: #00b894; color: white; }
        .btn-reset { background: #fab1a0; color: white; }
        .ng-hint { font-size: 0.7rem; color: #999; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥑 150cm 減脂儀表板</h1>

    <div class="timer-box">
        <div style="font-size: 0.8rem; opacity: 0.9;">186 斷食倒數 (19:00 關食)</div>
        <div class="timer-val" id="timer">--:--:--</div>
        <div id="fast-status" style="font-size: 0.8rem; margin-top: 5px;">目前處於：斷食期</div>
    </div>

    <div class="water-box">
        <div style="color: var(--water); font-weight: bold;">💧 飲水進度 (目標 1900ml)</div>
        <div class="water-grid" id="waterGrid"></div>
        <div style="font-size: 0.8rem; color: #555; margin-top: 8px;" id="waterText">已喝：0 ml</div>
    </div>

    <div class="stats-box">
        <div style="font-size: 0.9rem;">今日累積攝取</div>
        <div class="kcal-display" id="totalDisplay">0</div>
        <div id="statusText">目標：1100 - 1200 kcal</div>
    </div>

    <div class="card">
        <h3>🍱 份量估計 (150cm 女生專用)</h3>
        <div class="fist-calc">🥩 去骨肉: <input type="number" id="f_meat" value="0" step="0.5" oninput="sync()"> 拳 (200k)</div>
        <div class="fist-calc">🥬 綠色菜: <input type="number" id="f_veg" value="0" step="0.5" oninput="sync()"> 拳 (35k)</div>
        <div class="fist-calc">🍚 澱粉類: <input type="number" id="f_carbs" value="0" step="0.5" oninput="sync()"> 拳 (280k)</div>
        <select id="quick_sel" onchange="addQuick()">
            <option value="0">--- 快速加入常用項 ---</option>
            <option value="180">能量果凍 (180k)</option>
            <option value="75">茶葉蛋 1 顆 (75k)</option>
            <option value="150">超商雞胸肉 (150k)</option>
        </select>
        <input type="number" id="extra_kcal" placeholder="其他熱量輸入" oninput="sync()">
    </div>

    <div class="btn-group">
        <button class="btn-dice" onclick="rollExercise()">🎲 隨機運動</button>
        <button class="btn-reset" onclick="resetAll()">🧹 重設</button>
    </div>
    
    <div id="exerciseTask" style="text-align:center; font-weight:bold; color:var(--primary); margin-bottom:15px;">尚未抽運動任務</div>

    <button class="btn-main" onclick="saveToCalendar()">💾 儲存成果到 Google 日曆</button>

    <div class="ng-hint">🚫 禁：胡蘿蔔、洋蔥、小黃瓜、番茄、苦瓜、有骨肉</div>
</div>

<script>
    // 飲水功能
    let waterCount = 0;
    const waterGrid = document.getElementById('waterGrid');
    for(let i=0; i<8; i++) {
        const drop = document.createElement('span');
        drop.innerText = '💧';
        drop.className = 'water-drop';
        drop.onclick = function() {
            this.classList.toggle('active');
            waterCount = document.querySelectorAll('.water-drop.active').length;
            document.getElementById('waterText').innerText = `已喝：${waterCount * 250} ml`;
        };
        waterGrid.appendChild(drop);
    }

    // 斷食計時器 (假設 19:00 吃最後一餐，明天 13:00 開食)
    function updateTimer() {
        const now = new Date();
        const target = new Date();
        target.setHours(13, 0, 0); // 設定明天 13:00 開食

        if (now > target) target.setDate(target.getDate() + 1);
        
        const diff = target - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        
        const status = document.getElementById('fast-status');
        const currentHr = now.getHours();
        if(currentHr >= 13 && currentHr < 19) {
            status.innerText = "目前處於：進食窗口 🟢";
            document.querySelector('.timer-box').style.background = "#00b894";
        } else {
            status.innerText = "目前處於：斷食期 🔴";
            document.querySelector('.timer-box').style.background = "#d63031";
        }
    }
    setInterval(updateTimer, 1000);

    function sync() {
        const meat = (parseFloat(document.getElementById('f_meat').value) || 0) * 200;
        const veg = (parseFloat(document.getElementById('f_veg').value) || 0) * 35;
        const carbs = (parseFloat(document.getElementById('f_carbs').value) || 0) * 280;
        const extra = parseInt(document.getElementById('extra_kcal').value) || 0;
        const total = Math.round(meat + veg + carbs + extra);
        document.getElementById('totalDisplay').innerText = total;
    }

    function addQuick() {
        const val = parseInt(document.getElementById('quick_sel').value);
        if(val > 0) {
            const currentExtra = parseInt(document.getElementById('extra_kcal').value) || 0;
            document.getElementById('extra_kcal').value = currentExtra + val;
            sync();
        }
    }

    function rollExercise() {
        const ex = ["開合跳 3組", "跳繩 5分鐘", "核心訓練 10分鐘", "快走 30分鐘"];
        document.getElementById('exerciseTask').innerText = "任務：" + ex[Math.floor(Math.random()*ex.length)];
    }

    function saveToCalendar() {
        const kcal = document.getElementById('totalDisplay').innerText;
        const water = document.getElementById('waterText').innerText;
        const title = `減脂日記：${kcal} kcal / ${water}`;
        const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&add=`;
        window.open(url, '_blank');
    }

    function resetAll() {
        location.reload();
    }
    
    updateTimer();
</script>
</body>
</html>
