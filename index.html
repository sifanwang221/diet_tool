<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>150cm 減脂戰鬥機 v19.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --milk-tea: #f3e9dc; 
            --warm-white: #faf9f6;
            --dusty-rose: #e5989b; /* 毒舌閨蜜色 */
            --sage-green: #b7b7a4; 
            --fog-blue: #a8dadc;   /* 嚕嚕米藍 */
            --latte: #ddb892;
            --text-coffee: #6b4e3d;
            --shadow-soft: 0 8px 20px rgba(107, 78, 61, 0.08);
        }
        
        body { 
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif; 
            background-color: var(--milk-tea); 
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            padding: 15px; display: flex; justify-content: center; margin: 0; min-height: 100vh;
            color: var(--text-coffee);
        }
        
        .container { 
            background: var(--warm-white); 
            width: 100%; max-width: 410px; border-radius: 40px; 
            box-shadow: var(--shadow-soft); padding: 25px; box-sizing: border-box; 
            border: 4px solid white; position: relative;
        }

        /* 吐槽與溫柔提示區 */
        .header-box {
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px;
            border: 1.5px solid var(--dusty-rose); position: relative;
            box-shadow: 2px 4px 10px rgba(229, 152, 155, 0.1);
        }
        .header-box b { color: var(--dusty-rose); font-size: 0.85rem; }
        .header-box p { margin: 5px 0 0 0; font-size: 0.75rem; line-height: 1.4; color: var(--text-coffee); }
        .moomin-icon { position: absolute; right: -5px; top: -15px; font-size: 1.5rem; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #ece4db; padding: 6px; border-radius: 25px; }
        .tab-btn { 
            flex: 1; padding: 10px; border: none; border-radius: 20px; 
            background: transparent; font-weight: 700; font-size: 0.8rem; cursor: pointer; 
            color: var(--text-coffee); transition: 0.3s;
        }
        .tab-btn.active { background: white; color: var(--latte); box-shadow: var(--shadow-soft); }
        
        .sub-tabs { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .sub-btn { 
            background: transparent; border: 1.5px solid var(--sage-green); padding: 5px 12px; 
            border-radius: 15px; font-size: 0.7rem; color: var(--sage-green); font-weight: 700;
        }
        .sub-btn.active { background: var(--sage-green); color: white; }

        .page, .sub-page { display: none; }
        .page.active, .sub-page.active { display: block; animation: softIn 0.5s ease; }
        @keyframes softIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: white; border-radius: 22px; padding: 18px; margin-bottom: 15px; 
            border: 1px solid rgba(171, 145, 122, 0.1);
        }
        h4 { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--text-coffee); display: flex; align-items: center; gap: 6px; }
        
        .status-card { 
            padding: 20px; border-radius: 28px; text-align: center; margin-bottom: 15px; 
            color: white; border: 2px solid rgba(255,255,255,0.4);
        }

        input { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid var(--milk-tea); 
            margin-bottom: 8px; box-sizing: border-box; font-family: 'Quicksand', sans-serif;
        }
        .fist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn-action { 
            border: none; padding: 14px; border-radius: 20px; width: 100%; 
            font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.3s;
        }
        .btn-random { background: var(--sage-green); color: white; }
        .btn-sport { background: var(--dusty-rose); color: white; }
        
        .water-drop { font-size: 1.8rem; cursor: pointer; filter: grayscale(1) opacity(0.2); transition: 0.3s; display: inline-block; margin: 2px; }
        .water-drop.active { filter: grayscale(0) opacity(1); transform: scale(1.1); }
        
        .moomin-tip { font-size: 0.7rem; color: var(--text-coffee); background: #fdf2f2; padding: 8px; border-radius: 10px; margin-top: 10px; border-left: 3px solid var(--dusty-rose); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <span class="moomin-icon">☁️</span>
        <b>👠 毒舌閨蜜：</b>
        <p id="roast-text">三拳肉？妳是去參加大胃王比賽還是把自己當河馬？150cm 的胃撐成這樣，妳好意思嗎？</p>
        <div class="moomin-tip"><b>🎨 嚕嚕米：</b>「沒關係，我們慢慢喝點水，剩下的晚餐再吃就好了喔～(摸頭)」</div>
    </div>

    <div class="tabs">
        <button id="t1" class="tab-btn active" onclick="showPage('p1', 't1')">靈感</button>
        <button id="t2" class="tab-btn" onclick="showPage('p2', 't2')">紀錄</button>
        <button id="t3" class="tab-btn" onclick="showPage('p3', 't3')">行動</button>
    </div>

    <div id="p1" class="page active">
        <div class="sub-tabs">
            <button id="st1" class="sub-btn active" onclick="showSubPage('sp1', 'st1')">超商自由配</button>
            <button id="st2" class="sub-btn" onclick="showSubPage('sp2', 'st2')">自助餐秘密</button>
        </div>
        <div id="sp1" class="sub-page active">
            <button class="btn-action btn-random" onclick="randomMeal()">🎲 隨機點餐（救救選擇障礙）</button>
            <div id="randomDisplay" style="display:none; background:var(--warm-white); border:1px dashed var(--latte); padding:15px; border-radius:20px; margin-bottom:15px; font-size:0.8rem; text-align:center;"></div>
            <div class="card">
                <h4>🏪 閨蜜精選：超商公式</h4>
                <p style="font-size:0.75rem; color:var(--text-coffee);">飯糰/三明治 + 雞胸/豆漿 = 完美</p>
            </div>
        </div>
        <div id="sp2" class="sub-page">
            <div class="card">
                <h4>🍱 自助餐：復刻健康餐盒</h4>
                <p style="font-size:0.75rem; line-height:1.6;">記得「夾菜不夾汁」。省下的 50 元可以拿去買漂亮衣服，這才叫生活！</p>
            </div>
        </div>
    </div>

    <div id="p2" class="page">
        <div id="totalBox" class="status-card" style="background:var(--latte)">
            <div id="totalDisplay" style="font-size:2.8rem; font-weight:700;">0</div>
            <div style="font-size:0.8rem; opacity:0.9;">目前的總熱量 (目標1200)</div>
        </div>
        <div class="card">
            <input type="text" id="calcInput" placeholder="直接輸入算式...">
            <div class="fist-grid">
                <input type="number" id="f_meat" placeholder="肉拳數" oninput="autoCalc()">
                <input type="number" id="f_veg" placeholder="菜拳數" oninput="autoCalc()">
                <input type="number" id="f_carbs" placeholder="飯拳數" oninput="autoCalc()">
                <input type="number" id="f_extra" placeholder="加項(k)" oninput="autoCalc()">
            </div>
        </div>
        <div id="timerBox" class="status-card" style="background:var(--dusty-rose)">
            <div id="timer" style="font-size:1.6rem; font-weight:700;">--:--:--</div>
            <div id="fast-status" style="font-size:0.75rem;">倒數計時中</div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="card" style="background:var(--fog-blue); border:none; text-align:center;">
            <h4 style="justify-content:center; color:#555;">💧 嚕嚕米遞水 (1900ml)</h4>
            <div id="waterGrid" style="margin: 10px 0;"></div>
            <div id="waterText" style="font-weight:bold; color:#444;">0 ml</div>
        </div>
        <button class="btn-action btn-sport" onclick="generateWorkout()">生成今日戰鬥課表</button>
        <div id="workout-list"></div>
    </div>
</div>

<script>
    function showPage(p, t) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById(t).classList.add('active');
    }
    function showSubPage(sp, st) {
        document.querySelectorAll('.sub-page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.sub-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(sp).classList.add('active');
        document.getElementById(st).classList.add('active');
    }
    function randomMeal() {
        const m = ["雞肉飯糰+無糖豆漿", "舒肥雞沙拉+溫泉蛋", "地瓜(小)+無糖拿鐵", "關東煮蘿蔔/豆腐+茶葉蛋"];
        const res = document.getElementById('randomDisplay');
        res.style.display = "block";
        res.innerHTML = `🌟 閨蜜幫妳選好了：<br><b>${m[Math.floor(Math.random()*m.length)]}</b>`;
    }
    
    function autoCalc() {
        const formula = document.getElementById('calcInput').value;
        let inputVal = 0;
        try { if(formula.trim() !== "") inputVal = Function('"use strict"; return (' + formula.replace(/[^-()\d/*+.]/g, '') + ')')(); } catch(e) {}
        const m = (parseFloat(document.getElementById('f_meat').value) || 0) * 200;
        const v = (parseFloat(document.getElementById('f_veg').value) || 0) * 35;
        const c = (parseFloat(document.getElementById('f_carbs').value) || 0) * 280;
        const e = parseInt(document.getElementById('f_extra').value) || 0;
        const total = Math.round(inputVal + m + v + c + e);
        document.getElementById('totalDisplay').innerText = total;

        // 根據熱量變更吐槽語
        const r = document.getElementById('roast-text');
        if(total > 1300) r.innerText = "1300卡？妳這是在養豬還是在養自己？快去操場跑十圈！";
        else if(total > 1000) r.innerText = "已經破千了喔，剩下的妳看著辦吧（翻白眼）。";
        else r.innerText = "目前表現還可以，希望妳晚上的意志力跟妳嘴饞的速度一樣快。";
    }

    let wCount = 0;
    const grid = document.getElementById('waterGrid');
    for(let i=0; i<8; i++) {
        const d = document.createElement('span'); d.className = 'water-drop'; d.innerText = '💧';
        d.onclick = function() {
            this.classList.toggle('active');
            wCount = Array.from(grid.children).filter(c => c.classList.contains('active')).length;
            document.getElementById('waterText').innerText = `${wCount * 250} ml`;
        };
        grid.appendChild(d);
    }

    function updateTimer() {
        const now = new Date();
        const start = new Date(); start.setHours(13,0,0,0);
        const stop = new Date(); stop.setHours(19,0,0,0);
        const tEl = document.getElementById('timer');
        const sEl = document.getElementById('fast-status');
        if (now >= start && now < stop) {
            tEl.innerText = formatMs(stop - now); sEl.innerText = "進食視窗 🟢 (別塞太快！)";
        } else {
            let target = start; if (now >= stop) target.setDate(target.getDate()+1);
            tEl.innerText = formatMs(target - now); sEl.innerText = "燃脂斷食中 🔴 (閉嘴！)";
        }
    }
    function formatMs(ms) {
        const h = Math.floor(ms/3600000).toString().padStart(2,'0');
        const m = Math.floor((ms%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((ms%60000)/1000).toString().padStart(2,'0');
        return `${h}:${m}:${s}`;
    }
    setInterval(updateTimer, 1000); updateTimer();

    function generateWorkout() {
        const moves = ["開合跳 50下", "捲腹 20下", "棒式 1分鐘", "深蹲 20下", "波比跳 10下"];
        let h = "";
        moves.forEach((m, i) => h += `<div style="padding:10px; background:#f9f9f9; margin-bottom:5px; border-radius:12px; font-size:0.75rem; border:1px dashed var(--dusty-rose)">${i+1}. ${m}</div>`);
        document.getElementById('workout-list').innerHTML = h;
    }
</script>
</body>
</html>
